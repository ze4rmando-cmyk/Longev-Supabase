version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: longev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: longev
      POSTGRES_PASSWORD: longev_dev_password
      POSTGRES_DB: longev_db
    ports:
      - "5432:5432"
    volumes:
      - longev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U longev -d longev_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  longev_postgres_data:
